<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pockt Finance</title>
  <script src="./tailwindcss.js"></script>
  <script src="./iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1e293b;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Plus Jakarta Sans", "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0B2545;
    }

    * {
      transition: all 0.2s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .glass-card {
      background: rgba(255, 255, 255, 1);
      box-shadow: 0px 6px 12px 0px rgba(0, 0, 0, 0.12);
      border: 1px solid #F4F4F6;
    }

    .input-focus-ring {
      @apply focus-within:ring-2 focus-within:ring-[#17A2A8]/20 focus-within:border-[#17A2A8] outline-none;
    }

    .auth-gradient-bg {
      background: #F9FAFA;
    }

    input::placeholder {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body class="auth-gradient-bg min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-50 w-full bg-white/60 backdrop-blur-md border-b border-[#F4F4F6] px-4 md:px-16 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-[#0B2545] rounded-md flex items-center justify-center">
        <img src="./assets/IMG_1.svg" alt="Logo Icon" class="w-5.5 h-5.5">
      </div>
      <div class="flex flex-col">
        <span class="text-[20px] font-bold leading-none text-[#0B2545]">Pockt Finance</span>
        <span class="text-[10px] font-medium text-[#353940] tracking-tight">The pocket-sized CFO.</span>
      </div>
    </div>
    
    <div class="flex items-center gap-2 md:gap-4">
      <button class="hidden sm:block text-sm font-medium text-[#17191C] px-4 py-2 hover:bg-gray-50 rounded-lg">Log in</button>
      <button class="bg-[#17A2A8] text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-[#148e93] shadow-sm">Open Account</button>
      <button class="p-2 text-[#17191C] hover:bg-gray-50 rounded-lg">
        <img src="./assets/IMG_2.svg" alt="Help" class="w-5 h-5">
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-[450px] glass-card rounded-xl p-6 md:p-8">
      <h1 class="text-2xl font-bold mb-2">Welcome Back</h1>
      <p class="text-sm text-[#353940] mb-8">Access your Pockt Finance business dashboard</p>

      <form class="space-y-5">
        <!-- Email Field -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-[#17191C]">Work Email</label>
          <div class="relative flex items-center border border-[#DEDFE3] rounded-lg px-3 py-2.5 bg-white input-focus-ring">
            <img src="./assets/IMG_3.svg" alt="Mail" class="w-4 h-4 mr-2.5">
            <input type="email" placeholder="name@company.com" class="w-full text-sm outline-none bg-transparent text-[#353940]">
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-sm font-medium text-[#17191C]">Password</label>
            <button type="button" class="text-xs text-[#17A2A8] hover:underline">Forgot password?</button>
          </div>
          <div class="relative flex items-center border border-[#DEDFE3] rounded-lg px-3 py-2.5 bg-white input-focus-ring">
            <img src="./assets/IMG_4.svg" alt="Lock" class="w-4 h-4 mr-2.5">
            <input type="password" placeholder="••••••••" class="w-full text-sm outline-none bg-transparent text-[#353940]">
          </div>
        </div>

        <!-- Remember Device -->
        <div class="flex items-start gap-2 py-1">
          <input type="checkbox" id="remember" class="mt-1 w-4 h-4 border-[#565e6c] rounded accent-[#17A2A8]">
          <label for="remember" class="text-sm font-medium text-[#353940] cursor-pointer">Remember this device for 30 days</label>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="w-full bg-[#17A2A8] text-white font-semibold py-3 rounded-lg shadow-md hover:bg-[#148e93] active:scale-[0.99]">
          Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-[#F4F4F6]"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="bg-white px-3 text-[12px] uppercase tracking-wider text-[#353940]">Or continue with</span>
        </div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center gap-2 border border-[#DEDFE3] rounded-lg py-3 hover:bg-gray-50">
          <img src="./assets/IMG_5.webp" alt="Google" class="w-4 h-4">
          <span class="text-sm font-medium text-[#17191C]">Google</span>
        </button>
        <button class="flex items-center justify-center gap-2 border border-[#DEDFE3] rounded-lg py-3 hover:bg-gray-50">
          <img src="./assets/IMG_6.webp" alt="Microsoft" class="w-4 h-4">
          <span class="text-sm font-medium text-[#17191C]">Microsoft</span>
        </button>
      </div>
    </div>

    <!-- Bottom Links -->
    <div class="mt-8 text-center space-y-4">
      <p class="text-sm text-[#353940]">
        Don't have a business account yet? 
        <button class="text-[#17A2A8] font-semibold hover:underline ml-1">Get Started for Free</button>
      </p>
      
      <div class="flex items-center justify-center gap-6 opacity-60">
        <div class="flex items-center gap-1.5">
          <img src="./assets/IMG_7.svg" alt="Shield" class="w-3 h-3">
          <span class="text-[12px] text-[#353940]">SOC2 Compliant</span>
        </div>
        <div class="flex items-center gap-1.5">
          <img src="./assets/IMG_4.svg" alt="Lock" class="w-3 h-3">
          <span class="text-[12px] text-[#353940]">256-bit Encryption</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full bg-white border-t border-[#F4F4F6] px-4 md:px-16 py-6 flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex flex-wrap justify-center md:justify-start items-center gap-4 md:gap-8 text-[12px] text-[#353940]">
      <span>© 2024 Pockt Finance Inc.</span>
      <a href="#" class="hover:text-[#17A2A8]">Terms & Privacy</a>
      <a href="#" class="hover:text-[#17A2A8]">GDPR</a>
      <a href="#" class="hover:text-[#17A2A8]">Security</a>
    </div>
    
    <div class="flex items-center gap-4 text-[12px] text-[#353940]">
      <div class="flex items-center gap-1.5 cursor-pointer hover:text-[#17A2A8]">
        <img src="./assets/IMG_8.svg" alt="Globe" class="w-3 h-3">
        <span>United States (English)</span>
        <img src="./assets/IMG_9.svg" alt="Chevron" class="w-3 h-3">
      </div>
      <span class="opacity-30 hidden sm:block">|</span>
      <span class="italic font-medium text-[#17A2A8] hidden sm:block">The pocket-sized CFO.</span>
    </div>
  </footer>

</body>
</html>
